name: CI

on:
  push:
    branches: [ "backend" ]
  pull_request:
    branches: [ "backend" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: techie
          POSTGRES_PASSWORD: Techie@123
          POSTGRES_DB: skillswap_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U techie -d skillswap_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build Docker image
        run: docker build -t skillswap:latest .

