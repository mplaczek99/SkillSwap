name: CI

on:
  push:
    branches: [ "backend" ]
  pull_request:
    branches: [ "backend" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: techie
          POSTGRES_PASSWORD: Techie@123
          POSTGRES_DB: skillswap_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U techie -d skillswap_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22.0"

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Format code
        run: |
          gofmt -s -w .
          if [ -n "$(git diff --name-only)" ]; then
            echo "The following files need formatting. Run 'gofmt -s -w .' locally and commit the changes:"
            git diff --name-only
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detection and coverage
        run: go test -v -race -cover ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: false
          tags: skillswap:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

